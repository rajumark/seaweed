name: macOS Build and DMG (x86_64) - Static Linking
#working code perfectly no need any changes
on:
  push:
    branches: [ main_ff ] #working code but just disabled
  workflow_dispatch:

jobs:
  build-dmg-x86:
    runs-on: macos-14

    env:
      PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH
      PKG_CONFIG_PATH: /usr/local/opt/sdl2/lib/pkgconfig

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Intel Homebrew (if needed) and SDL2 for x86_64
      run: |
        if [ ! -d /usr/local/Homebrew ]; then
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi
        arch -x86_64 brew install cmake sdl2 pkg-config create-dmg

    - name: Check environment setup (x86_64)
      run: |
        echo "🔍 Checking required tools..."
        arch -x86_64 cmake --version
        arch -x86_64 pkg-config --version
        arch -x86_64 create-dmg --version || echo "⚠️ create-dmg not found"
        echo "📦 SDL2 libraries available:"
        arch -x86_64 find /usr/local -name "*SDL2*" 2>/dev/null || true

    - name: Set VERSION from file or fallback
      run: |
        if [ -f VERSION ]; then
          echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV
        else
          echo "VERSION=1.0.1" >> $GITHUB_ENV
        fi

    - name: Build (Intel x86_64) - Static Linking
      run: |
        rm -rf build && mkdir build
        cd build
        arch -x86_64 cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES=x86_64 \
          -DCMAKE_PREFIX_PATH="/usr/local/opt/sdl2" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
        arch -x86_64 make -j$(sysctl -n hw.ncpu)
        
        # Check if binary has SDL2 dependencies
        echo "🔍 Checking binary dependencies:"
        arch -x86_64 otool -L imgui_app.app/Contents/MacOS/imgui_app | grep -v "/System" | grep -v "/usr/lib" | grep -v "@rpath" || echo "✅ No external dynamic dependencies found"

    - name: Package binary into DMG - Static Linking
      run: |
        mkdir -p dist/imgui_folder/ADBKing.app/Contents/{MacOS,Resources}

        cp build/imgui_app.app/Contents/MacOS/imgui_app dist/imgui_folder/ADBKing.app/Contents/MacOS/ADBKing
        chmod +x dist/imgui_folder/ADBKing.app/Contents/MacOS/ADBKing

        # Verify static linking (no external dependencies)
        echo "🔍 Verifying static linking..."
        otool -L dist/imgui_folder/ADBKing.app/Contents/MacOS/ADBKing | grep -v "@rpath" | grep -v "/System" | grep -v "/usr/lib" || echo "✅ No external dynamic dependencies found"

        cp desktop-icons/icon-mac.icns dist/imgui_folder/ADBKing.app/Contents/Resources/

        cat << EOF > dist/imgui_folder/ADBKing.app/Contents/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>ADBKing</string>
            <key>CFBundleIdentifier</key>
            <string>com.adbking.app</string>
            <key>CFBundleName</key>
            <string>ADBKing</string>
            <key>CFBundleDisplayName</key>
            <string>ADBKing</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleIconFile</key>
            <string>icon-mac.icns</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>CFBundleSupportedPlatforms</key>
            <array>
                <string>MacOSX</string>
            </array>
        </dict>
        </plist>
        EOF

        # Optional: entitlements for static builds (minimal)
        cat << 'EOF' > entitlements.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
          <true/>
        </dict>
        </plist>
        EOF

        # Ad-hoc sign (minimal signing for static builds)
        codesign --force --deep --options runtime --entitlements entitlements.plist --timestamp=none --sign - dist/imgui_folder/ADBKing.app

        # Remove quarantine with error handling
        echo "🔧 Removing quarantine attributes..."
        xattr -dr com.apple.quarantine dist/imgui_folder/ADBKing.app 2>/dev/null || echo "⚠️ Could not remove quarantine attributes (this is normal in CI environment)"

        # Create Applications link
        ln -sf /Applications dist/imgui_folder/Applications

        DMG_PATH="dist/ADBKing-${VERSION}.dmg"
        [ -f "$DMG_PATH" ] && rm -f "$DMG_PATH"
        hdiutil detach "/Volumes/ADBKing" || true

        # Create DMG
        arch -x86_64 create-dmg \
          --volname "ADBKing" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "ADBKing.app" 150 200 \
          --icon "Applications" 350 200 \
          --hide-extension "ADBKing.app" \
          --app-drop-link 350 200 \
          "$DMG_PATH" \
          "dist/imgui_folder"

    - name: Print DMG info
      run: |
        echo "✅ DMG created: dist/ADBKing-${VERSION}.dmg"
        ls -lh "dist/ADBKing-${VERSION}.dmg"
        file dist/imgui_folder/ADBKing.app/Contents/MacOS/ADBKing
        echo "🔍 Final binary dependencies:"
        otool -L dist/imgui_folder/ADBKing.app/Contents/MacOS/ADBKing
        echo "📦 App bundle contents:"
        find dist/imgui_folder/ADBKing.app -type f -name "*.dylib" -o -name "ADBKing" | head -10
        echo "🔐 Code signing verification:"
        codesign -dv --verbose=4 dist/imgui_folder/ADBKing.app/Contents/MacOS/ADBKing

    - name: Push DMG to private repo
      env:
        GIT_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"
        
        # Check DMG file size
        DMG_SIZE=$(stat -f%z "dist/ADBKing-${VERSION}.dmg")
        echo "📦 DMG file size: ${DMG_SIZE} bytes"
        
        # Configure Git for large files
        git config --global http.postBuffer 524288000
        git config --global http.maxRequestBuffer 100M
        git config --global core.compression 9
        
        # Clone with depth 1 to reduce size
        git clone --depth 1 https://$GIT_TOKEN@github.com/rajumark/ADBKing.git
        
        mkdir -p ADBKing/MacIntel
        cp dist/ADBKing-${VERSION}.dmg ADBKing/MacIntel/
        
        cd ADBKing
        
        # Check if file actually exists and has content
        if [ ! -f "MacIntel/ADBKing-${VERSION}.dmg" ]; then
          echo "❌ DMG file not found in MacIntel directory"
          exit 1
        fi
        
        # Check file size after copy
        COPIED_SIZE=$(stat -f%z "MacIntel/ADBKing-${VERSION}.dmg")
        echo "📦 Copied DMG file size: ${COPIED_SIZE} bytes"
        
        if [ "$COPIED_SIZE" -eq 0 ]; then
          echo "❌ Copied DMG file is empty"
          exit 1
        fi
        
        git add MacIntel/
        
        # Use a more descriptive commit message
        git commit -m "Add ADBKing-${VERSION}.dmg for macOS Intel (x86_64) - Static Linking" || {
          echo "⚠️ No changes to commit (file might already exist)"
          exit 0
        }
        
        # Try push with retry logic
        MAX_RETRIES=3
        RETRY_COUNT=0
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          if git push origin main; then
            echo "✅ Successfully pushed to repository"
            break
          else
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⚠️ Push attempt $RETRY_COUNT failed, retrying..."
            sleep 5
          fi
        done
        
        if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
          echo "❌ Failed to push after $MAX_RETRIES attempts"
          echo "📋 Git status:"
          git status
          echo "📋 Git remote:"
          git remote -v
          exit 1
        fi

    - name: Verify inside DMG
      run: |
        hdiutil attach "dist/ADBKing-${VERSION}.dmg" -mountpoint /Volumes/ADBKingDebug
        echo "📦 Inside DMG:"
        ls -lhR /Volumes/ADBKingDebug
        echo "🔍 Gatekeeper:"
        spctl --assess --type execute --verbose /Volumes/ADBKingDebug/ADBKing.app || true
        hdiutil detach /Volumes/ADBKingDebug || true
