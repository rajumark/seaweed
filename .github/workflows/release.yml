name: Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac-arm64:
    name: macOS ARM64
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '#go')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          echo "::group::Install Homebrew dependencies"
          brew install cmake sdl2 create-dmg
          echo "[OK] Dependencies installed"
          echo "::endgroup::"
      - name: Configure and Build
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/sdl2/lib/pkgconfig
        run: |
          echo "::group::CMake configure"
          rm -rf build && mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64
          echo "[OK] CMake configured"
          echo "::endgroup::"
          echo "::group::Compile"
          make -j$(sysctl -n hw.ncpu)
          echo "[OK] Build complete"
          echo "::endgroup::"
      - name: Verify binary
        run: |
          echo "::group::Verify binary"
          file build/imgui_app.app/Contents/MacOS/imgui_app
          ls -lh build/imgui_app.app/Contents/MacOS/imgui_app
          echo "[OK] Binary ready"
          echo "::endgroup::"
      - name: Package DMG
        run: |
          echo "::group::Create DMG"
          VERSION=1.0.1
          mkdir -p dist/imgui_folder/ADBKing.app/Contents/{MacOS,Resources}
          cp build/imgui_app.app/Contents/MacOS/imgui_app dist/imgui_folder/ADBKing.app/Contents/MacOS/imgui_app
          chmod +x dist/imgui_folder/ADBKing.app/Contents/MacOS/imgui_app
          cp Info.plist dist/imgui_folder/ADBKing.app/Contents/Info.plist
          cp desktop-icons/icon-mac.icns dist/imgui_folder/ADBKing.app/Contents/Resources/
          codesign --force --deep --options runtime --timestamp=none --sign - dist/imgui_folder/ADBKing.app
          ln -sf /Applications dist/imgui_folder/Applications
          create-dmg --volname "ADBKing" --window-pos 200 120 --window-size 600 400 \
            --icon-size 100 --icon "ADBKing.app" 150 200 --icon "Applications" 350 200 \
            --hide-extension "ADBKing.app" --app-drop-link 350 200 \
            "dist/ADBKing-${VERSION}-arm64.dmg" "dist/imgui_folder"
          echo "[OK] DMG created at dist/ADBKing-${VERSION}-arm64.dmg"
          ls -lh "dist/ADBKing-${VERSION}-arm64.dmg"
          echo "::endgroup::"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*.dmg

  build-windows:
    name: Windows
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '#go')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WiX Toolset
        run: |
          echo "::group::Install WiX"
          choco install wixtoolset -y
          echo "[OK] WiX installed"
          echo "::endgroup::"
      - name: Install SDL2 and CURL via vcpkg
        run: |
          echo "::group::Setup vcpkg"
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          echo "[OK] vcpkg ready"
          echo "::endgroup::"
          echo "::group::Install packages"
          .\vcpkg\vcpkg install sdl2:x64-windows-static curl:x64-windows-static
          echo "[OK] Packages installed"
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=$env:GITHUB_WORKSPACE\vcpkg\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV
          echo "::endgroup::"
      - name: Configure and Build
        run: |
          echo "::group::CMake configure"
          $toolchain = Resolve-Path "$env:CMAKE_TOOLCHAIN_FILE"
          Write-Host "[INFO] Toolchain: $toolchain"
          mkdir build && cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_BUILD_TYPE=Release
          if ($LASTEXITCODE -ne 0) { Write-Host "[FAIL] CMake configure failed"; exit 1 }
          Write-Host "[OK] CMake configured"
          echo "::endgroup::"
          echo "::group::Compile"
          cmake --build . --config Release --verbose
          if ($LASTEXITCODE -ne 0) { Write-Host "[FAIL] Build failed"; exit 1 }
          Write-Host "[OK] Build complete"
          echo "::endgroup::"
      - name: Verify binary
        run: |
          echo "::group::Verify binary"
          if (Test-Path "build\Release\imgui_app.exe") {
            $fs = (Get-Item "build\Release\imgui_app.exe").Length
            Write-Host "[OK] imgui_app.exe found - $([math]::Round($fs / 1MB, 2)) MB"
          } else {
            Write-Host "[FAIL] imgui_app.exe not found at build\Release\imgui_app.exe"
            exit 1
          }
          echo "::endgroup::"
      - name: Package MSI
        run: |
          echo "::group::Create MSI"
          $date = Get-Date -Format 'yyyyMMdd-HHmm'
          mkdir dist
          copy desktop-icons\icon-windows.ico icon-windows.ico
          echo "This software is provided as-is without any warranty. Use at your own risk." | Out-File -FilePath "license.rtf" -Encoding UTF8
          (Get-Content installer.wxs) -replace 'PUT-UPGRADE-CODE-HERE', [guid]::NewGuid().ToString() `
            -replace 'PUT-EXE-GUID', [guid]::NewGuid().ToString() `
            -replace 'PUT-SHORTCUT-GUID', [guid]::NewGuid().ToString() | Set-Content installer.wxs
          candle.exe installer.wxs -out installer.wixobj
          if ($LASTEXITCODE -ne 0) { Write-Host "[FAIL] candle (WiX compile) failed"; exit 1 }
          light.exe installer.wixobj -out imgui_app.msi -ext WixUIExtension
          if ($LASTEXITCODE -ne 0) { Write-Host "[FAIL] light (WiX link) failed"; exit 1 }
          $msiName = "ADBKing-1.0.1-$date.msi"
          copy imgui_app.msi "dist/$msiName"
          Write-Host "[OK] MSI created at dist/$msiName"
          echo "::endgroup::"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.msi

  build-linux:
    name: Linux
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '#go')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          echo "::group::Install apt packages"
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libcurl4-openssl-dev cmake pkg-config
          echo "[OK] Dependencies installed"
          echo "::endgroup::"
      - name: Configure and Build
        run: |
          echo "::group::CMake configure"
          rm -rf build && mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          echo "[OK] CMake configured"
          echo "::endgroup::"
          echo "::group::Compile"
          make -j$(nproc)
          echo "[OK] Build complete"
          echo "::endgroup::"
      - name: Verify binary
        run: |
          echo "::group::Verify binary"
          file build/imgui_app
          ls -lh build/imgui_app
          echo "[OK] Binary ready"
          echo "::endgroup::"
      - name: Package tar.gz
        run: |
          echo "::group::Create tar.gz"
          VERSION=1.0.1
          mkdir -p dist/ADBKing
          cp build/imgui_app dist/ADBKing/
          cp desktop-icons/icon-linux.png dist/ADBKing/
          chmod +x dist/ADBKing/imgui_app
          cd dist
          tar czf "ADBKing-${VERSION}-linux-x86_64.tar.gz" ADBKing/
          echo "[OK] Package created at dist/ADBKing-${VERSION}-linux-x86_64.tar.gz"
          ls -lh "ADBKing-${VERSION}-linux-x86_64.tar.gz"
          echo "::endgroup::"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.tar.gz

  create-release:
    needs: [build-mac-arm64, build-windows, build-linux]
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '#go')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: List downloaded artifacts
        run: |
          echo "::group::Downloaded artifacts"
          find . -type f -name "*.dmg" -o -name "*.msi" -o -name "*.tar.gz" | while read f; do
            echo "  [$(du -h "$f" | cut -f1)] $f"
          done
          echo "::endgroup::"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1-${{ github.run_number }}
          name: ADBKing v1.0.1 (${{ github.run_number }})
          body: |
            Automated release for commit ${{ github.sha }}
          files: |
            macos-arm64/*
            windows/*
            linux/*
          generate_release_notes: true
